# This is a test configuration.

global
	maxconn		100
	stats socket /tmp/sock1 mode 666 level admin
	stats timeout 2m

listen  Stats_fnt
        mode            http
        bind		:8181
        timeout client	5000
	timeout connect	5000
	timeout server	5000
        maxconn 100
        option  httpclose
	balance roundrobin
	stats uri /
	stats refresh 5
	stats scope Thousand_HTTP

frontend dummy
	bind :8080
	mode http
	redirect location /
