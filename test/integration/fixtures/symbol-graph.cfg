defaults profile_default
    mode http

cache bench_cache
    total-max-size 4

resolvers mydns
    nameserver ns1 127.0.0.1:53

userlist stats-auth
    user admin insecure-password admin

peers mypeers
    peer p1 127.0.0.1:10000

frontend web from profile_default
    bind :80
    acl is_api path_beg /api
    acl AUTH http_auth(stats-auth)
    filter comp-req
    filter comp-res
    filter-sequence request comp-req,comp-res
    http-request cache-use bench_cache
    use_backend api if is_api

backend api
    server web1 host.local:8080 resolvers mydns check
    use-server web1 if is_api
    stick-table type ip size 1 peers mypeers
