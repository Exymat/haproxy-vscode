frontend bad@name
    bind bad!host:80
    acl bad/name path_beg /admin

frontend legacy_addr *:443
    bind :443

listen legacy_listen 127.0.0.1:8888
    bind :8888

frontend missing_port
    bind :

frontend port_range
    bind :9000
    log 127.0.0.1:10001-10010 local0

backend offset_range
    server s1 : source 0.0.0.0 usesrc 0.0.0.1:+16002
