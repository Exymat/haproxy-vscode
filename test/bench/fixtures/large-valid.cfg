# GENERATED FILE: large-valid.cfg
# PROFILE: tokenize
# FIXTURE_TYPE: valid
# BENCH_ANCHOR: front-default-backend bench_api_0000
global
    log stdout format raw local0
    master-worker
    maxconn 200000
    nbthread 8
    stats socket ipv4@127.0.0.1:9999 level admin expose-fd listeners
    ssl-default-bind-options no-sslv3 no-tlsv10
    tune.bufsize 32768
    tune.maxrewrite 4096

defaults
    log global
    log-format '%{+Q}o %ci %t %H %ST %TR'
    error-log-format '%ci %ts'
    mode http
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    retries 3

resolvers bench_dns
    nameserver dns1 10.0.0.10:53
    nameserver dns2 10.0.0.11:53
    accepted_payload_size 8192
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s

cache bench_cache
    total-max-size 256
    max-age 60

userlist bench_users
    group admins users alice
    user alice insecure-password alicepw groups admins

peers bench_peers
    peer node1 127.0.0.1:10000
    peer node2 127.0.0.1:10001

frontend bench_public
    bind :8080
    bind :8443 ssl crt /etc/haproxy/certs/example.pem alpn h2,http/1.1
    option forwardfor
    http-request set-var(txn.req_id) req.hdr(x-request-id),lower
    http-request set-header x-env production if { path_beg /api }
    acl is_api path_beg /api /v1 /v2
    acl wants_cache hdr_sub(cache-control) max-age
    use_backend bench_api_0000 if is_api
    http-response set-header x-cache-status HIT if wants_cache
    default_backend bench_api_0000

listen bench_stats
    bind :8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s

backend bench_api_0000
    balance first
    unique-id-format '%ci-0000'
    http-request set-var-fmt(txn.bench_log) '%[src] %ci'
    option httpchk
    http-check send meth GET uri /health ver HTTP/1.1 hdr Host bench-0000.internal
    http-check expect status 200
    acl canary_0000 hdr(x-canary) -i shard-0
    http-request set-header x-backend-id 0000
    http-request cache-use bench_cache if { method GET }
    http-response cache-store bench_cache if { status 200 }
    stick-table type ip size 1000 expire 30m store gpc0,http_req_rate(10s)
    stick on src
    server-template srv 3 bench-api-0000.service.local:9000 check resolvers bench_dns init-addr libc,none
    server backup1 127.0.0.1:10000 backup check inter 2s fall 2 rise 3
    http-after-response set-header x-compression gzip if { status 200 }

frontend bench_extra_0000
    bind :10080
    mode http
    acl route_0000 path_beg /tenant/0
    use_backend bench_api_0000 if route_0000
    default_backend bench_api_0000

listen bench_tcp_0000
    bind :12000
    mode tcp
    option tcplog
    timeout client 1m
    timeout server 1m
    server tcp1 127.0.0.1:14000 check
    server tcp2 127.0.0.1:15000 check backup

