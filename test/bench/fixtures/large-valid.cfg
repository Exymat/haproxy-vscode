    server backup1 127.0.0.1:10249 backup check inter 6s fall 2 rise 3
    http-after-response set-header x-compression deflate if { status 200 }

backend bench_api_1250
    balance leastconn
    option httpchk
    http-check send meth PUT uri /health ver HTTP/1.1 hdr Host bench-1250.internal
    http-check expect status 200
    acl canary_1250 hdr(x-canary) -i shard-9
    http-request set-header x-backend-id 1250
    http-request cache-use bench_cache if { method GET }
    http-response cache-store bench_cache if { status 200 }
    stick-table type ip size 1000 expire 30m store gpc0,http_req_rate(10s)
    stick on src
    server-template srv 3 bench-api-1250.service.local:9250 check resolvers bench_dns init-addr libc,none
    server backup1 127.0.0.1:10250 backup check inter 2s fall 2 rise 3
    http-after-response set-header x-compression gzip if { status 200 }

backend bench_api_1251
    balance roundrobin
