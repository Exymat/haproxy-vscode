frontend test_acl from default
  http-request redirect scheme https if { dst_port -m int 80 }
  acl host_example req.hdr(host),host_only -m str example.com
  acl maintenance_hour var(req.current_hour) -m int 0 22:23
  http-request deny if { nbsrv eq 0 }
  http-after-response set-header X-Test value if { ssl_fc }
