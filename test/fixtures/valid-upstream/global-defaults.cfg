global
    daemon
    maxconn 2000

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend public
    bind :80
    default_backend web

backend web
    balance roundrobin
    server web1 127.0.0.1:80 check
    server web2 127.0.0.1:81 check
