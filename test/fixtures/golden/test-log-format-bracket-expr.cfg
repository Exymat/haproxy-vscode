# Valid log-format bracket expressions in set-header values.
# Regression: %{+Q}[ssl_c_s_dn] must not report "unexpected ']'".

defaults
	mode http
	timeout client 1s
	timeout server 1s
	timeout connect 1s

frontend ssl_headers
	bind :443 ssl crt /etc/haproxy/certs/server.pem
	http-request set-header ssl_client_cert_issuer %{+Q}[ssl_c_i_dn] if { ssl_fc_has_crt }
	http-request set-header ssl_client_cert_dn %{+Q}[ssl_c_s_dn] if { ssl_fc_has_crt }
	http-request set-header ssl_client_cert_cn %{+Q}[ssl_c_s_dn(cn)] if { ssl_fc_has_crt }
