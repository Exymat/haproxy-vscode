frontend www
    bind *:80
    use_backend www if { var(http_host) -m reg -p "^www\." }
    use_backend non_www if { var(http_host) -m reg -p "^(?!www\.).*" }

backend www
    server www_server 127.0.0.1:8080

backend non_www
    server non_www_server 127.0.0.1:8081

frontend dyn_backend
    bind *:80
    use_backend %[var(http_host)] if { var(http_host) }
