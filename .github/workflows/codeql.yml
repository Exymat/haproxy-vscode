name: CodeQL

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "test/**"
      - "syntaxes/**"
      - "schemas/**"
      - "scripts/**"
      - "package-lock.json"
      - "tsconfig*.json"
      - "eslint.config.mjs"
      - "vitest*.ts"
      - "language-configuration.json"
      - ".vscodeignore"
      - ".vscode-test.js"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "test/**"
      - "syntaxes/**"
      - "schemas/**"
      - "scripts/**"
      - "package-lock.json"
      - "tsconfig*.json"
      - "eslint.config.mjs"
      - "vitest*.ts"
      - "language-configuration.json"
      - ".vscodeignore"
      - ".vscode-test.js"
      - ".github/workflows/**"
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Build
        run: npm run compile

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
