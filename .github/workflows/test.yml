name: Test

on:
  workflow_dispatch:
  push:
    paths:
      - "**/*.md"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "test/**/*.ts"
      - "test/**/*.cjs"
      - "test/bench/fixtures/**"
      - "test/bench/thresholds.json"
      - "test/bench/perf-integration-thresholds.json"
      - "syntaxes/**"
      - "schemas/**"
      - "scripts/**/*.mjs"
      - "scripts/**/*.cjs"
      - "scripts/**/*.d.mts"
      - "tsconfig*.json"
      - "eslint.config.mjs"
      - "vitest*.ts"
      - "language-configuration.json"
      - ".vscodeignore"
      - ".vscode-test.js"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "**/*.md"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "test/**/*.ts"
      - "test/**/*.cjs"
      - "test/bench/fixtures/**"
      - "test/bench/thresholds.json"
      - "test/bench/perf-integration-thresholds.json"
      - "syntaxes/**"
      - "schemas/**"
      - "scripts/**/*.mjs"
      - "scripts/**/*.cjs"
      - "scripts/**/*.d.mts"
      - "tsconfig*.json"
      - "eslint.config.mjs"
      - "vitest*.ts"
      - "language-configuration.json"
      - ".vscodeignore"
      - ".vscode-test.js"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/**"

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      package: ${{ steps.filter.outputs.package }}
      deps: ${{ steps.filter.outputs.deps }}
      source: ${{ steps.filter.outputs.source }}
      build_tooling: ${{ steps.filter.outputs.build_tooling }}
      unit_tests: ${{ steps.filter.outputs.unit_tests }}
      integration_tests: ${{ steps.filter.outputs.integration_tests }}
      scripts: ${{ steps.filter.outputs.scripts }}
      tooling: ${{ steps.filter.outputs.tooling }}
      packaging: ${{ steps.filter.outputs.packaging }}
      workflows: ${{ steps.filter.outputs.workflows }}
      bench_code: ${{ steps.filter.outputs.bench_code }}
      bench_thresholds: ${{ steps.filter.outputs.bench_thresholds }}
      integration_perf_thresholds: ${{ steps.filter.outputs.integration_perf_thresholds }}
      threshold_validation: ${{ steps.filter.outputs.threshold_validation }}
      integration_perf: ${{ steps.filter.outputs.integration_perf }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docs:
              - '**/*.md'
              - 'docs/**'
            package:
              - 'package.json'
            deps:
              - 'package-lock.json'
            source:
              - 'src/**'
              - 'syntaxes/**'
              - 'schemas/**'
              - 'language-configuration.json'
            build_tooling:
              - 'tsconfig.json'
            unit_tests:
              - 'test/unit/**'
              - 'test/helpers/**'
              - 'test/__mocks__/**'
              - 'vitest.config.ts'
              - 'tsconfig.test.json'
            integration_tests:
              - 'test/integration/**'
              - '.vscode-test.js'
              - 'tsconfig.integration.json'
            scripts:
              - 'scripts/**'
            tooling:
              - 'tsconfig.eslint.json'
              - 'eslint.config.mjs'
              - '.prettierrc'
              - '.prettierignore'
            packaging:
              - '.vscodeignore'
            workflows:
              - '.github/workflows/**'
            bench_code:
              - 'test/bench/**/*.bench.ts'
              - 'test/bench/**/*.ts'
              - 'test/bench/fixtures/**'
              - 'vitest.bench.config.ts'
              - 'scripts/generate-bench-fixture.mjs'
              - 'scripts/check-bench-thresholds.mjs'
              - 'scripts/update-bench-thresholds.mjs'
              - 'scripts/bench-tags.mjs'
              - 'scripts/tag-bench/**'
            bench_thresholds:
              - 'test/bench/thresholds.json'
            integration_perf_thresholds:
              - 'test/bench/perf-integration-thresholds.json'
            threshold_validation:
              - 'test/bench/thresholds.json'
              - 'test/bench/perf-integration-thresholds.json'
              - 'scripts/validate-bench-thresholds.mjs'
            integration_perf:
              - 'src/**'
              - 'syntaxes/**'
              - 'schemas/**'
              - 'language-configuration.json'
              - 'test/integration/suite/perf.test.ts'
              - 'scripts/run-perf-integration.mjs'
              - 'scripts/check-perf-integration-thresholds.mjs'

  format-docs:
    name: Format docs
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check markdown formatting
        run: npx prettier --check "**/*.md"

  validate-package:
    name: Validate manifest
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.package == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check package.json formatting
        run: npx prettier --check package.json

      - name: Validate extension manifest
        run: npm run validate:manifest

  validate-packaging:
    name: Validate packaging
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.packaging == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies --out /tmp/haproxy-test.vsix

  lint:
    name: Lint
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.source == 'true' ||
      needs.changes.outputs.build_tooling == 'true' ||
      needs.changes.outputs.unit_tests == 'true' ||
      needs.changes.outputs.integration_tests == 'true' ||
      needs.changes.outputs.bench_code == 'true' ||
      needs.changes.outputs.scripts == 'true' ||
      needs.changes.outputs.tooling == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  audit:
    name: Dependency audit
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.deps == 'true' ||
      needs.changes.outputs.package == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  format:
    name: Format check
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.source == 'true' ||
      needs.changes.outputs.build_tooling == 'true' ||
      needs.changes.outputs.unit_tests == 'true' ||
      needs.changes.outputs.integration_tests == 'true' ||
      needs.changes.outputs.bench_code == 'true' ||
      needs.changes.outputs.scripts == 'true' ||
      needs.changes.outputs.tooling == 'true' ||
      needs.changes.outputs.package == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

  bench-fixture:
    name: Benchmark fixtures
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.bench_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check generated benchmark fixtures
        run: npm run bench:fixture:check

  bench-thresholds:
    name: Benchmark thresholds
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.threshold_validation == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate benchmark thresholds
        run: npm run validate:bench-thresholds

  compile:
    name: Compile
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.source == 'true' ||
      needs.changes.outputs.build_tooling == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

  unit:
    name: Unit tests
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.source == 'true' ||
      needs.changes.outputs.unit_tests == 'true' ||
      needs.changes.outputs.build_tooling == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          flags: ${{ matrix.os }}
          name: coverage-${{ matrix.os }}

  integration:
    name: Integration tests
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.source == 'true' ||
      needs.changes.outputs.integration_tests == 'true' ||
      needs.changes.outputs.build_tooling == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Integration tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration

      - name: Integration tests
        if: runner.os != 'Linux'
        run: npm run test:integration

      - name: Verify clean worktree
        run: npm run check:git-clean

  integration-perf:
    name: Integration perf tests
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.integration_perf == 'true' ||
      needs.changes.outputs.integration_perf_thresholds == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Integration perf benchmarks
        env:
          HAPROXY_PERF_BENCH: "1"
        run: xvfb-run -a npm run bench:integration

      - name: Upload integration perf report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-integration-report
          path: scripts/reports/perf-integration.json
          if-no-files-found: ignore

  bench:
    name: Performance benchmarks
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.source == 'true' ||
      needs.changes.outputs.bench_code == 'true' ||
      needs.changes.outputs.bench_thresholds == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Performance benchmarks
        run: npm run bench:ci

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-report
          path: scripts/reports/bench-latest.json
          if-no-files-found: ignore
