name: Test

on:
  workflow_dispatch:
  push:
    paths:
      - "**/*.md"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "test/**"
      - "syntaxes/**"
      - "schemas/**"
      - "scripts/**"
      - "tsconfig*.json"
      - "eslint.config.mjs"
      - "vitest*.ts"
      - "language-configuration.json"
      - ".vscodeignore"
      - ".vscode-test.js"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "**/*.md"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "test/**"
      - "syntaxes/**"
      - "schemas/**"
      - "scripts/**"
      - "tsconfig*.json"
      - "eslint.config.mjs"
      - "vitest*.ts"
      - "language-configuration.json"
      - ".vscodeignore"
      - ".vscode-test.js"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/**"

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      package: ${{ steps.filter.outputs.package }}
      deps: ${{ steps.filter.outputs.deps }}
      extension: ${{ steps.filter.outputs.extension }}
      scripts: ${{ steps.filter.outputs.scripts }}
      tooling: ${{ steps.filter.outputs.tooling }}
      packaging: ${{ steps.filter.outputs.packaging }}
      workflows: ${{ steps.filter.outputs.workflows }}
      bench: ${{ steps.filter.outputs.bench }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docs:
              - '**/*.md'
              - 'docs/**'
            package:
              - 'package.json'
            deps:
              - 'package-lock.json'
            extension:
              - 'src/**'
              - 'test/**'
              - 'syntaxes/**'
              - 'schemas/**'
              - 'language-configuration.json'
            scripts:
              - 'scripts/**'
            tooling:
              - 'tsconfig*.json'
              - 'eslint.config.mjs'
              - 'vitest*.ts'
              - '.vscode-test.js'
              - '.prettierrc'
              - '.prettierignore'
            packaging:
              - '.vscodeignore'
            workflows:
              - '.github/workflows/**'
            bench:
              - 'src/**'
              - 'syntaxes/**'
              - 'schemas/**'
              - 'test/bench/**'
              - 'test/integration/suite/99-perf.test.ts'
              - 'vitest.bench.config.ts'
              - 'scripts/generate-bench-fixture.mjs'
              - 'scripts/check-bench-thresholds.mjs'
              - 'scripts/check-perf-integration-thresholds.mjs'
              - 'scripts/update-bench-thresholds.mjs'
              - 'scripts/bench-tags.mjs'
              - 'scripts/run-tag-bench-suite.mjs'
              - 'scripts/run-perf-integration.mjs'
              - 'scripts/tag-bench/**'

  format-docs:
    name: Format docs
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check markdown formatting
        run: npm run format:check:docs

  validate-package:
    name: Validate manifest
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.package == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check package.json formatting
        run: npx prettier --check package.json

      - name: Validate extension manifest
        run: npm run validate:manifest

  validate-packaging:
    name: Validate packaging
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.packaging == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies --out /tmp/haproxy-test.vsix

  lint:
    name: Lint
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.scripts == 'true' ||
      needs.changes.outputs.tooling == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  audit:
    name: Dependency audit
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.deps == 'true' ||
      needs.changes.outputs.package == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  format:
    name: Format check
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.scripts == 'true' ||
      needs.changes.outputs.tooling == 'true' ||
      needs.changes.outputs.package == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

  bench-fixture:
    name: Benchmark fixtures
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.bench == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check generated benchmark fixtures
        run: npm run bench:fixture:check

  compile:
    name: Compile
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.tooling == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

  unit:
    name: Unit tests
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.extension == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          flags: ${{ matrix.os }}
          name: coverage-${{ matrix.os }}

  integration:
    name: Integration tests
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.tooling == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Integration tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration

      - name: Integration tests
        if: runner.os != 'Linux'
        run: npm run test:integration

      - name: Verify clean worktree
        run: npm run check:git-clean

  integration-perf:
    name: Integration perf tests
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.bench == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Integration perf benchmarks
        env:
          HAPROXY_PERF_BENCH: "1"
        run: xvfb-run -a npm run bench:integration

      - name: Upload integration perf report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-integration-report
          path: scripts/reports/perf-integration.json
          if-no-files-found: ignore

  bench:
    name: Performance benchmarks
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.bench == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Performance benchmarks
        run: npm run bench:ci

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-report
          path: scripts/reports/bench-latest.json
          if-no-files-found: ignore
